<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Reminder App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        button {
            background: #667eea;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: background 0.3s, transform 0.2s;
            width: 100%;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .birthday-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .birthday-item {
            background: #f5f5f5;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .birthday-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .birthday-item h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .birthday-item p {
            color: #666;
            margin: 4px 0;
            font-size: 0.95em;
        }

        .birthday-date {
            color: #764ba2;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .empty-state p {
            font-size: 1.1em;
        }

        .status-message {
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 5px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status-message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .api-endpoint {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 0.9em;
            word-break: break-all;
        }

        .api-endpoint label {
            margin-bottom: 8px;
        }

        .api-endpoint input {
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .stat-box {
            background: #667eea;
            color: white;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }
        }

        .refresh-btn {
            background: #28a745;
            margin-top: 10px;
            font-size: 0.9em;
            padding: 8px;
        }

        .refresh-btn:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎂 Birthday Reminder App</h1>
            <p>Manage and celebrate birthdays with AWS</p>
        </div>

        <div class="main-content">
            <!-- Add Birthday Form -->
            <div class="card">
                <h2>Add Birthday</h2>

                <div class="api-endpoint">
                    <label>API Endpoint:</label>
                    <input type="text" id="apiEndpoint" placeholder="https://xxxxx.execute-api.region.amazonaws.com/dev">
                    <small style="color: #666; margin-top: 5px; display: block;">
                        Copy your API endpoint from CloudFormation outputs
                    </small>
                </div>

                <div id="formStatusMessage" class="status-message"></div>

                <form id="birthdayForm">
                    <div class="form-group">
                        <label for="personId">Person ID (Optional)</label>
                        <input type="text" id="personId" placeholder="Auto-generated if empty">
                    </div>

                    <div class="form-group">
                        <label for="name">Full Name *</label>
                        <input type="text" id="name" placeholder="e.g., John Doe" required>
                    </div>

                    <div class="form-group">
                        <label for="birthDate">Birth Date *</label>
                        <input type="date" id="birthDate" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="e.g., john@example.com">
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" placeholder="e.g., +1-555-0123">
                    </div>

                    <button type="submit" id="submitBtn">Add Birthday</button>
                </form>
            </div>

            <!-- Birthday List -->
            <div class="card">
                <h2>Birthday List</h2>

                <div id="listStatusMessage" class="status-message"></div>

                <button class="refresh-btn" onclick="loadBirthdays()">
                    <span id="refreshBtnText">Refresh List</span>
                </button>

                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-number" id="birthdayCount">0</div>
                        <div class="stat-label">Total Birthdays</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="upcoming">-</div>
                        <div class="stat-label">This Month</div>
                    </div>
                </div>

                <div id="birthdayListContainer" class="birthday-list">
                    <div class="empty-state">
                        <p>No birthdays yet. Add one to get started!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const API_ENDPOINT_KEY = 'CNkt2FtTWJ8jXZVFmhiMl5kTcDgvtQvb3PCxoJAk';

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Load API endpoint from local storage
            const savedEndpoint = localStorage.getItem(API_ENDPOINT_KEY);
            if (savedEndpoint) {
                document.getElementById('apiEndpoint').value = savedEndpoint;
            }

            // Add event listeners
            document.getElementById('birthdayForm').addEventListener('submit', handleAddBirthday);
            document.getElementById('apiEndpoint').addEventListener('change', saveApiEndpoint);

            // Initial load
            loadBirthdays();
        });

        // Save API endpoint to local storage
        function saveApiEndpoint() {
            const endpoint = document.getElementById('apiEndpoint').value.trim();
            if (endpoint) {
                localStorage.setItem(API_ENDPOINT_KEY, endpoint);
                showMessage('listStatusMessage', 'API endpoint saved!', 'info');
            }
        }

        // Get API endpoint
        function getApiEndpoint() {
            return document.getElementById('apiEndpoint').value.trim();
        }

        // Validate API endpoint is set
        function validateApiEndpoint() {
            if (!getApiEndpoint()) {
                showMessage('formStatusMessage', 'Please enter your API endpoint first', 'error');
                return false;
            }
            return true;
        }

        // Show status messages
        function showMessage(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = `status-message ${type}`;

            // Auto-hide success messages after 3 seconds
            if (type === 'success') {
                setTimeout(() => {
                    element.className = 'status-message';
                }, 3000);
            }
        }

        // Load birthdays from API
        async function loadBirthdays() {
            if (!validateApiEndpoint()) return;

            const endpoint = getApiEndpoint();
            const refreshBtn = document.querySelector('.refresh-btn');
            const refreshBtnText = document.getElementById('refreshBtnText');

            try {
                // Show loading state
                refreshBtn.disabled = true;
                refreshBtnText.innerHTML = '<span class="loading"></span> Loading...';
                showMessage('listStatusMessage', 'Loading birthdays...', 'info');

                // Make API request
                const response = await fetch(`${endpoint}/birthdays`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                // Handle response
                let birthdays = [];
                if (data.birthdays && Array.isArray(data.birthdays)) {
                    birthdays = data.birthdays;
                } else if (data.body && typeof data.body === 'string') {
                    // Parse JSON from string body
                    const parsed = JSON.parse(data.body);
                    birthdays = parsed.birthdays || [];
                }

                // Display birthdays
                displayBirthdays(birthdays);
                showMessage('listStatusMessage', `Successfully loaded ${birthdays.length} birthday(ies)`, 'success');

            } catch (error) {
                console.error('Error loading birthdays:', error);
                showMessage('listStatusMessage', `Error: ${error.message}`, 'error');
                displayBirthdays([]);

            } finally {
                refreshBtn.disabled = false;
                refreshBtnText.textContent = 'Refresh List';
            }
        }

        // Display birthdays in the list
        function displayBirthdays(birthdays) {
            const container = document.getElementById('birthdayListContainer');
            const count = document.getElementById('birthdayCount');
            const upcoming = document.getElementById('upcoming');

            count.textContent = birthdays.length;

            if (birthdays.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>No birthdays yet. Add one to get started!</p>
                    </div>
                `;
                upcoming.textContent = '0';
                return;
            }

            const now = new Date();
            const currentDay = now.getDate();
            const currentMonth = now.getMonth() + 1;
            
            const upcomingCount = birthdays.filter(b => {
                if (b.birthDate) {
                    const parts = b.birthDate.split('-');
                    if (parts.length === 3) {
                        const month = parseInt(parts[1]);
                        const day = parseInt(parts[2]);
                        return (month === currentMonth && day >= currentDay);
                    }
                }
                return false;
            }).length;
            
            upcoming.textContent = upcomingCount;

            container.innerHTML = birthdays.map(birthday => {
                let formattedDate = 'Unknown date';
                let age = null;
                
                if (birthday.birthDate) {
                    const parts = birthday.birthDate.split('-');
                    if (parts.length === 3) {
                        const year = parseInt(parts[0]);
                        const month = parseInt(parts[1]);
                        const day = parseInt(parts[2]);
                        
                        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                            'July', 'August', 'September', 'October', 'November', 'December'];
                        formattedDate = `${monthNames[month - 1]} ${day}, ${year}`;
                        
                        const today = new Date();
                        let calculatedAge = today.getFullYear() - year;
                        if (today.getMonth() + 1 < month || 
                            (today.getMonth() + 1 === month && today.getDate() < day)) {
                            calculatedAge--;
                        }
                        age = calculatedAge >= 0 ? calculatedAge : null;
                    }
                }

                let html = `
                    <div class="birthday-item">
                        <h3>${escapeHtml(birthday.name)}</h3>
                        <p class="birthday-date">📅 ${formattedDate}</p>
                `;

                if (age) {
                    html += `<p>🎂 Turns ${age} years old</p>`;
                }
                if (birthday.email) html += `<p>📧 ${escapeHtml(birthday.email)}</p>`;
                if (birthday.phone) html += `<p>📞 ${escapeHtml(birthday.phone)}</p>`;
                if (birthday.personId) html += `<p><small>ID: ${escapeHtml(birthday.personId)}</small></p>`;

                html += `</div>`;
                return html;
            }).join('');
        }

        // Calculate age from birth date string
        function calculateAge(birthDateString) {
            const birthDate = new Date(birthDateString);
            const today = new Date();

            if (isNaN(birthDate.getTime())) {
                return null;
            }

            let age = today.getFullYear() - birthDate.getFullYear();
            const monthDiff = today.getMonth() - birthDate.getMonth();

            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }

            return age >= 0 ? age : null;
        }

        // Calculate age from month, day, year components
        function calculateAgeFromParts(month, day, year) {
            const today = new Date();
            let age = today.getFullYear() - year;

            if (today.getMonth() + 1 < month ||
                (today.getMonth() + 1 === month && today.getDate() < day)) {
                age--;
            }

            return age >= 0 ? age : null;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Handle add birthday form submission
        async function handleAddBirthday(e) {
            e.preventDefault();
            if (!validateApiEndpoint()) return;
            const endpoint = getApiEndpoint();
            const submitBtn = document.getElementById('submitBtn');
            try {
                submitBtn.disabled = true;
                submitBtn.textContent = 'Adding...';
                const birthDateStr = document.getElementById('birthDate').value;
 
                // Parse the date string into components
                const [birthYear, birthMonth, birthDay] = birthDateStr.split('-').map(Number);
 
                const formData = {
                    name: document.getElementById('name').value.trim(),
                    birthDate: birthDateStr,
                    birthMonth,
                    birthDay,
                    birthYear,
                    email: document.getElementById('email').value.trim(),
                    phone: document.getElementById('phone').value.trim()
                };
 
                const personId = document.getElementById('personId').value.trim();
                if (personId) {
                    formData.personId = personId;
                }
 
                const response = await fetch(`${endpoint}/birthdays`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
 
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
 
                const data = await response.json();
                showMessage('formStatusMessage', `Birthday for ${formData.name} added successfully!`, 'success');
                document.getElementById('birthdayForm').reset();
                await loadBirthdays();
            } catch (error) {
                console.error('Error adding birthday:', error);
                showMessage('formStatusMessage', `Error: ${error.message}`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Add Birthday';
            }
        }
	</script>
</body>
</html>
